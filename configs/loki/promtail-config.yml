server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape Docker container logs
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=ai-weather-analytics"]

    relabel_configs:
      # Set container name as label
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'

      # Set compose service name
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'

      # Set compose project
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'project'

      # Set container ID
      - source_labels: ['__meta_docker_container_id']
        target_label: 'container_id'

      # Set image name
      - source_labels: ['__meta_docker_container_label_com_docker_compose_image']
        target_label: 'image'

    pipeline_stages:
      # Parse JSON logs from Python/Celery
      - json:
          expressions:
            level: levelname
            logger: name
            message: message
            timestamp: created

      # Set log level
      - labels:
          level:

      # Extract timestamp
      - timestamp:
          source: timestamp
          format: Unix

      # Output final log line
      - output:
          source: message

  # Scrape system logs (optional)
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          __path__: /var/log/*log
