steps:
  # Install dependencies and run tests
  - name: 'python:3.11-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install -r requirements.txt
        pytest --cov=src --cov-report=term

  # Build backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/weather-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/weather-backend:latest'
      - '-f'
      - 'Dockerfile.backend'
      - '.'

  # Build frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/weather-frontend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/weather-frontend:latest'
      - '-f'
      - 'Dockerfile.frontend'
      - '.'

  # Build worker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/weather-worker:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/weather-worker:latest'
      - '-f'
      - 'Dockerfile'
      - '.'

  # Push images to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/weather-backend']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/weather-frontend']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/weather-worker']

  # Deploy backend to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'weather-backend'
      - '--image=gcr.io/$PROJECT_ID/weather-backend:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3001'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--timeout=300'
      - '--set-env-vars=NODE_ENV=production,PORT=3001'
      - '--set-secrets=REDIS_URL=REDIS_URL:latest'
      - '--vpc-connector=weather-connector'
      - '--ingress=all'

  # Deploy frontend to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'weather-frontend'
      - '--image=gcr.io/$PROJECT_ID/weather-frontend:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=80'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--timeout=60'
      - '--ingress=all'

  # Deploy worker to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'weather-worker'
      - '--image=gcr.io/$PROJECT_ID/weather-worker:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--port=9091'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--min-instances=1'
      - '--max-instances=5'
      - '--timeout=3600'
      - '--set-env-vars=CELERY_BROKER_URL=redis://MEMORYSTORE_IP:6379,CELERY_RESULT_BACKEND=redis://MEMORYSTORE_IP:6379'
      - '--set-secrets=S3_WEATHER_BUCKET=S3_WEATHER_BUCKET:latest,AWS_ACCESS_KEY_ID=AWS_ACCESS_KEY_ID:latest,AWS_SECRET_ACCESS_KEY=AWS_SECRET_ACCESS_KEY:latest'
      - '--vpc-connector=weather-connector'
      - '--ingress=internal'

  # Update traffic to new revision (gradual rollout)
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'services'
      - 'update-traffic'
      - 'weather-backend'
      - '--to-latest'
      - '--region=us-central1'

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'services'
      - 'update-traffic'
      - 'weather-frontend'
      - '--to-latest'
      - '--region=us-central1'

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'services'
      - 'update-traffic'
      - 'weather-worker'
      - '--to-latest'
      - '--region=us-central1'

images:
  - 'gcr.io/$PROJECT_ID/weather-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/weather-backend:latest'
  - 'gcr.io/$PROJECT_ID/weather-frontend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/weather-frontend:latest'
  - 'gcr.io/$PROJECT_ID/weather-worker:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/weather-worker:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'
